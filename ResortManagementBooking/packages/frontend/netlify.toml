# Netlify configuration for GlanGetaway React Single Page Application (SPA)

[build]
  # Directory where built files are generated by Vite
  publish = "dist"
  
  # Command used to build the production bundle
  command = "npm run build"

# Redirect rule to handle React Router single-page app (SPA) routing.
# This prevents 404 errors when a user refreshes the page or goes directly to a subpath.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and caching headers for optimized performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Content-Security-Policy = "upgrade-insecure-requests"
